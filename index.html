<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lobby | @GameRemastered - Spectrum Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f2a, #0a0a1a);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* ========== ANIMASI BACKGROUND SPEKTRUM ========== */
        .spectrum-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0a0a2a, #0f0f2a);
        }

        .gradient-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 40%, rgba(0, 255, 255, 0.25), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.2), transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(255, 105, 180, 0.2), transparent 50%),
                        radial-gradient(circle at 70% 20%, rgba(0, 150, 255, 0.25), transparent 50%);
            animation: spectrumShift 12s ease-in-out infinite;
        }

        @keyframes spectrumShift {
            0%, 100% {
                background: radial-gradient(circle at 20% 40%, rgba(0, 255, 255, 0.3), transparent 50%),
                            radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.25), transparent 50%),
                            radial-gradient(circle at 40% 80%, rgba(255, 105, 180, 0.25), transparent 50%),
                            radial-gradient(circle at 70% 20%, rgba(0, 150, 255, 0.3), transparent 50%);
            }
            50% {
                background: radial-gradient(circle at 80% 60%, rgba(0, 255, 255, 0.4), transparent 50%),
                            radial-gradient(circle at 20% 20%, rgba(255, 0, 255, 0.35), transparent 50%),
                            radial-gradient(circle at 50% 85%, rgba(255, 105, 180, 0.35), transparent 50%),
                            radial-gradient(circle at 90% 40%, rgba(0, 150, 255, 0.4), transparent 50%);
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(0, 255, 255, 0.4);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Container utama */
        .lobby-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(15, 20, 40, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 28px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
        }

        /* Header */
        .lobby-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 255, 255, 0.4);
            padding-bottom: 20px;
            position: relative;
        }
        .lobby-header::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 25%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #0ff, #f0f, #ff69b4, transparent);
            animation: borderGlow 3s ease-in-out infinite;
        }
        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .lobby-header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ff69b4, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .lobby-header p {
            color: #e0e0e0;
            margin-top: 10px;
            font-size: 1rem;
        }
        .highlight {
            background: linear-gradient(135deg, #00ffff, #ff69b4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
        }

        /* Tombol WhatsApp */
        .whatsapp-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .wa-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 0 #075e54;
            position: relative;
            overflow: hidden;
        }
        .wa-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .wa-btn:hover::before { left: 100%; }
        .wa-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #075e54; }

        /* Search Section - RAPI TIDAK MELAMPAUI */
        .search-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .search-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 14px 22px;
            border: none;
            border-radius: 60px;
            background: rgba(20, 25, 50, 0.9);
            color: white;
            font-size: 0.95rem;
            outline: none;
            border: 1px solid rgba(0, 255, 255, 0.4);
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
        }
        .search-btn {
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            color: #0a0a1a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .search-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
        .search-btn:active { transform: scale(0.98); }
        .jumlah-info {
            color: #00ffff;
            font-size: 0.85rem;
            margin-top: 12px;
            padding-left: 8px;
        }

        /* LIST WEB - GRID 2 KOLOM RAPI */
        .web-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            max-height: 500px;
            overflow-y: auto;
            padding: 4px 6px 4px 4px;
        }
        .web-list::-webkit-scrollbar {
            width: 6px;
        }
        .web-list::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.1);
            border-radius: 10px;
        }
        .web-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00ffff, #ff69b4);
            border-radius: 10px;
        }

        /* WEB CARD - ESTETIS RAPI */
        .web-card {
            background: linear-gradient(135deg, rgba(35, 40, 70, 0.8), rgba(25, 30, 60, 0.85));
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 18px 20px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .web-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.05), rgba(255, 105, 180, 0.05));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .web-card:hover::before { opacity: 1; }
        .web-card:hover {
            border-color: #ff69b4;
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 255, 255, 0.2);
        }

        .web-info {
            flex: 1;
        }
        .web-name {
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffdd99, #ffaa66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .web-desc {
            font-size: 0.75rem;
            color: #aaaadd;
            line-height: 1.4;
        }
        .web-link {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #88ccff;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid rgba(0, 255, 255, 0.2);
            display: inline-block;
            width: fit-content;
            max-width: 100%;
        }
        .open-icon {
            font-size: 1.2rem;
            background: linear-gradient(135deg, #00ffff, #ff69b4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: right;
            margin-top: 5px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(145deg, rgba(35, 35, 70, 0.98), rgba(25, 25, 55, 0.98));
            border-radius: 44px;
            padding: 28px;
            max-width: 450px;
            width: 85%;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.25s ease;
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content h3 {
            background: linear-gradient(135deg, #00ffff, #ff69b4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        .modal-url {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 20px;
            color: #88ccff;
            font-family: monospace;
            word-break: break-all;
            margin: 15px 0;
            font-size: 0.8rem;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-go {
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            color: #0a0a1a;
        }
        .btn-cancel {
            background: rgba(50, 50, 80, 0.9);
            color: #ddd;
        }
        .modal-btn:active { transform: scale(0.96); }

        .footer-credit {
            text-align: center;
            margin-top: 30px;
            color: #88aaff;
            font-size: 0.7rem;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            .web-list { grid-template-columns: 1fr; }
            .lobby-container { padding: 20px; }
            .lobby-header h1 { font-size: 2rem; }
        }
        @media (max-width: 550px) {
            .search-bar { flex-direction: column; }
            .search-btn { width: 100%; white-space: normal; }
            .wa-btn { padding: 8px 18px; font-size: 0.8rem; }
            .web-card { padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div class="spectrum-bg"></div>
    <div class="gradient-animation"></div>
    <div class="particles" id="particles"></div>

<div class="lobby-container">
    <div class="lobby-header">
        <h1>🎮 LOBBY | @GameRemastered</h1>
        <p>Tempat dimana anda bisa dengan mudah menemukan web buatan <span class="highlight">@GameRemastered</span> yang didirikan oleh <span class="highlight">@RANDI</span></p>
    </div>

    <div class="whatsapp-buttons">
        <a class="wa-btn" id="whatsappChannelBtn" href="#" target="_blank">📢 WhatsApp Channel</a>
        <a class="wa-btn" id="whatsappGroupBtn" href="#" target="_blank">👥 Grup WhatsApp</a>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cari nama web, deskripsi, atau teknologi..." autocomplete="off">
            <button id="searchButton" class="search-btn">Cari</button>
        </div>
        <div class="jumlah-info">📦 JUMLAH WEB : <span id="totalCount">0</span></div>
    </div>

    <div class="web-list" id="webListContainer"></div>

    <div class="footer-credit">
        ✨ @GameRemastered | Klik card web untuk membuka detail | Spectrum Grid ✨
    </div>
</div>

<div id="linkModal" class="modal">
    <div class="modal-content">
        <h3>🔗 Buka Link</h3>
        <div class="modal-url" id="modalUrlDisplay">https://...</div>
        <div class="modal-buttons">
            <button class="modal-btn btn-go" id="modalGoBtn">🚀 GO</button>
            <button class="modal-btn btn-cancel" id="modalCancelBtn">✖ CANCEL</button>
        </div>
    </div>
</div>

<script>
    // ========== DATA WEB BUATAN @GAMEREMASTERED ==========
    const webProjects = [
        { name: "HARVEST OVERDRIVE", desc: "Game farm", url: "https://GameRemastered.github.io/FarmManager/" },
        { name: "BOMB REMASTERED", desc: "Game bomb, jangan sampai kena bomb", url: "https://GameRemastered.github.io/BOMB-REMASTERED/" },
        { name: "VERB REMASTERED", desc: "Game tebak kalimat, isi kalimat, lengkapi", url: "https://GameRemastered.github.io/VerbRemastered/" },
        { name: "SNAKE REMASTERED", desc: "Game ular klasik", url: "https://GameRemastered.github.io/SnakeIoRemastered/" },
        { name: "METRO EVADER - METEOR", desc: "Game menghindari meteor", url: "https://GameRemastered.github.io/Metro-HindariMeteor/" },
        { name: "FLAPPY BIRD REMASTERED", desc: "Game burung, jangan sampai burung anda nabrak pohon", url: "https://GameRemastered.github.io/FlappyBirdRemastered/" },
        { name: "GOLDEN SERENITY SOCIETY", desc: "Game klik klik santai", url: "https://GameRemastered.github.io/ClickCoinRemastered-Society/" },
        { name: "INDUSTRIAL EMPIRE", desc: "Game membangun pabrik", url: "https://GameRemastered.github.io/IndustrialEmpire/" },
        { name: "SLOT FORTUNE", desc: "Game slot modern", url: "https://GameRemastered.github.io/SlotFortune/" },
        { name: "BLOCK 2048 REMASTERED", desc: "Game gabungkan balok sampai angka 2048", url: "https://GameRemastered.github.io/-Block2048/" },
        { name: "TETRIS REMASTERED", desc: "Game tetris klasik", url: "https://GameRemastered.github.io/TetrisRemastered/" },
        { name: "COMING SOON", desc: "COMING SOON", url: "https://game-remastered.github.io/quiz-master" },
        { name: "COMING SOON", desc: "COMING SOON", url: "https://game-remastered.github.io/dice-rpg" },
        { name: "COMING SOON", desc: "COMING SOON", url: "https://game-remastered.github.io/space-invaders-3d" },
        { name: "COMING SOON", desc: "COMING SOON", url: "https://game-remastered.github.io/pixel-editor" }
    ];

    let currentFiltered = [...webProjects];
    const webListContainer = document.getElementById('webListContainer');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchButton');
    const totalCountSpan = document.getElementById('totalCount');
    const modal = document.getElementById('linkModal');
    const modalUrlDisplay = document.getElementById('modalUrlDisplay');
    const modalGoBtn = document.getElementById('modalGoBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    let pendingUrl = '';

    // Particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 8 + 6 + 's';
            particle.style.animationDelay = Math.random() * 12 + 's';
            particle.style.background = `rgba(${Math.random() * 100 + 100}, ${Math.random() * 100 + 100}, 255, ${Math.random() * 0.5 + 0.2})`;
            container.appendChild(particle);
        }
    }
    createParticles();

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function truncateUrl(url, maxLen = 45) {
        if (url.length <= maxLen) return url;
        return url.substring(0, maxLen) + '...';
    }
    
    function renderWebList(projects) {
        if (projects.length === 0) {
            webListContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:#88aaff;">✨ Tidak ada web yang cocok dengan pencarian. ✨</div>`;
            totalCountSpan.innerText = '0';
            return;
        }
        let html = '';
        projects.forEach(proj => {
            html += `
                <div class="web-card" data-url="${escapeHtml(proj.url)}">
                    <div class="web-info">
                        <div class="web-name">${escapeHtml(proj.name)}</div>
                        <div class="web-desc">${escapeHtml(proj.desc)}</div>
                    </div>
                    <div class="web-link">
                        🔗 ${truncateUrl(proj.url, 42)}
                    </div>
                    <div class="open-icon">➡️ Klik untuk buka</div>
                </div>
            `;
        });
        webListContainer.innerHTML = html;
        totalCountSpan.innerText = projects.length;
        
        document.querySelectorAll('.web-card').forEach(card => {
            card.addEventListener('click', () => {
                const url = card.getAttribute('data-url');
                if (url) openLinkModal(url);
            });
        });
    }
    
    function filterWebsites() {
        const keyword = searchInput.value.toLowerCase().trim();
        if (keyword === '') {
            currentFiltered = [...webProjects];
        } else {
            currentFiltered = webProjects.filter(proj => 
                proj.name.toLowerCase().includes(keyword) || 
                proj.desc.toLowerCase().includes(keyword) ||
                proj.url.toLowerCase().includes(keyword)
            );
        }
        renderWebList(currentFiltered);
    }
    
    function openLinkModal(url) {
        pendingUrl = url;
        modalUrlDisplay.innerText = url;
        modal.style.display = 'flex';
    }
    
    function closeModal() {
        modal.style.display = 'none';
        pendingUrl = '';
    }
    
    function goToLink() {
        if (pendingUrl) {
            window.open(pendingUrl, '_blank', 'noopener,noreferrer');
        }
        closeModal();
    }
    
    const whatsappChannelLink = "https://whatsapp.com/channel/0029Vb7b08C23n3dNLvZuW3z";
    const whatsappGroupLink = "https://chat.whatsapp.com/LPtwgRgVT1n3MAXfnFFoVy?mode=gi_t";
    
    function setupWhatsappButtons() {
        const channelBtn = document.getElementById('whatsappChannelBtn');
        const groupBtn = document.getElementById('whatsappGroupBtn');
        if (channelBtn) { channelBtn.href = whatsappChannelLink; channelBtn.setAttribute('target', '_blank'); }
        if (groupBtn) { groupBtn.href = whatsappGroupLink; groupBtn.setAttribute('target', '_blank'); }
    }
    
    function init() {
        renderWebList(webProjects);
        setupWhatsappButtons();
        searchBtn.addEventListener('click', filterWebsites);
        searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') filterWebsites(); });
        modalGoBtn.addEventListener('click', goToLink);
        modalCancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    }
    init();
</script>
</body>
</html>
